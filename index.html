        rgba(10,12,26,0.7) 0%, rgba(10,12,26,0.1) 18%,
        rgba(10,12,26,0.05) 38%, rgba(10,12,26,0.35) 58%,
        rgba(10,12,26,0.9) 100%),
      linear-gradient(to right,
        rgba(10,12,26,0.0) 0%, rgba(10,12,26,0.15) 40%,
        rgba(10,12,26,0.5) 70%, rgba(10,12,26,0.7) 100%);
    pointer-events: none; z-index: 2; opacity: 0;
  }

  .content {
    position: relative; z-index: 5;
    padding: 4px 14px 10px; height: 100%;
    display: flex; flex-direction: column;
    align-items: flex-end;
  }

  .dots {
    color: #1a3a5a; font-family: monospace; font-size: 11px;
    letter-spacing: 2px; width: 100%; opacity: 0;
  }

  .title-area {
    padding: 4px 0 2px;
    align-self: center; text-align: center;
  }

  .art-img {
    image-rendering: pixelated;
    display: block; max-width: 100%; height: auto;
  }

  /* Typing clip mask — reveals top to bottom, no layout shift */
  .art-typing {
    clip-path: inset(0 0 100% 0);
  }

  .hr { border: none; border-top: 1px solid rgba(64,176,255,0.15); margin: 3px 0; width: 100%; opacity: 0; }
  .spacer { flex: 1; }

  .lineup-area {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 0;
  }

  .lineup-item {
    margin-bottom: 4px;
    clip-path: inset(0 0 100% 0);
  }

  .info-area {
    padding: 2px 0;
    display: flex; flex-direction: column; align-items: flex-end;
    opacity: 0; transition: opacity 0.8s ease-in;
  }

  .info-area canvas {
    image-rendering: pixelated; display: block;
  }

  .flicker { animation: flicker 5s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { opacity: 1; } 92% { opacity: 1; }
    93% { opacity: 0.8; } 94% { opacity: 1; }
    96% { opacity: 0.85; } 97% { opacity: 1; }
  }
</style>

<script>
const artMeta = {"title": {"h": 64, "num_lines": 4, "line_h": 14}, "sub": {"h": 53, "num_lines": 5, "line_h": 9}, "eeajik": {"h": 68, "num_lines": 5, "line_h": 12}, "STHQ": {"h": 56, "num_lines": 4, "line_h": 12}, "smocking_goose": {"h": 68, "num_lines": 5, "line_h": 12}, "IDIOTS": {"h": 60, "num_lines": 4, "line_h": 13}};

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Render pixel text on canvas (for info area)
function renderPixelText(text, color, fontSize, scale) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  ctx.font = fontSize + 'px RoundedFixedsys, monospace';
  const m = ctx.measureText(text);
  const w = Math.ceil(m.width) + 2, h = fontSize + 4;
  c.width = w; c.height = h;
  ctx.imageSmoothingEnabled = false;
  ctx.textBaseline = 'top';
  ctx.font = fontSize + 'px RoundedFixedsys, monospace';
  ctx.shadowColor = color; ctx.shadowBlur = 2;
  ctx.fillStyle = color;
  ctx.fillText(text, 1, 2);
  ctx.shadowBlur = 0;
  ctx.fillText(text, 1, 2);
  c.style.width = (w * scale) + 'px';
  c.style.height = (h * scale) + 'px';
  c.style.imageRendering = 'pixelated';
  c.style.display = 'block';
  return c;
}

// ==============================
// Typewriter reveal: clip-path reveals top to bottom (no layout shift)
// ==============================
async function typeReveal(elementId, metaKey, lineDelay) {
  const el = document.getElementById(elementId);
  const meta = artMeta[metaKey];
  const numLines = meta.num_lines;

  // Reveal line by line using clip-path
  for (let i = 1; i <= numLines; i++) {
    const hidePct = 100 - (i / numLines) * 100;
    el.style.clipPath = 'inset(0 0 ' + hidePct + '% 0)';
    await sleep(lineDelay);
  }
  // Fully visible
  el.style.clipPath = 'none';
}

// ==============================
// PHASE 1: DOS background scanline reveal
// ==============================
async function revealBackground() {
  const bg = document.getElementById('bg-dos');
  const grad = document.getElementById('bg-gradient');
  const steps = 40;
  const stepTime = 60;

  bg.style.opacity = '0.75';
  bg.style.clipPath = 'inset(0 0 100% 0)';

  for (let i = 0; i <= steps; i++) {
    bg.style.clipPath = 'inset(0 0 ' + (100 - (i / steps) * 100) + '% 0)';
    await sleep(stepTime);
  }

  grad.style.transition = 'opacity 0.5s ease-in';
  grad.style.opacity = '1';
  await sleep(600);
}

// ==============================
// PHASE 2: Title typing
// ==============================
async function revealTitle() {
  const dotsTop = document.getElementById('dots-top');
  dotsTop.style.transition = 'opacity 0.3s';
  dotsTop.style.opacity = '1';
  await sleep(300);

  // Type title line by line
  await typeReveal('art-title', 'title', 120);
  await sleep(200);

  // Type subtitle
  await typeReveal('art-sub', 'sub', 80);
  await sleep(200);

  document.getElementById('hr1').style.transition = 'opacity 0.3s';
  document.getElementById('hr1').style.opacity = '1';
  await sleep(300);
}

// ==============================
// PHASE 3: Lineup reveal
// ==============================
async function revealLineup() {
  const bandIds = ['eeajik', 'STHQ', 'smocking_goose', 'IDIOTS'];

  for (const id of bandIds) {
    await typeReveal('band-' + id, id, 100);
    await sleep(150);
  }

  document.getElementById('hr2').style.transition = 'opacity 0.3s';
  document.getElementById('hr2').style.opacity = '1';
  await sleep(200);
}

// ==============================
// PHASE 4: Info - build content upfront, fade in later
// ==============================
function buildInfoContent() {
  const area = document.getElementById('info-area');

  ['DATE 2026. 04. 10. FRI', 'OPEN 18:40', 'START 19:00', 'AT CLUB BBANG', '', 'ADV 25,000', 'DOOR 30,000'].forEach(line => {
    if (line === '') {
      const hr = document.createElement('hr');
      hr.style.cssText = 'border:none;border-top:1px solid rgba(64,176,255,0.15);margin:3px 0;width:100%';
      area.appendChild(hr);
      return;
    }
    const c = renderPixelText(line, '#a0d0ff', 9, 2);
    c.style.marginBottom = '2px';
    area.appendChild(c);
  });
}

async function revealInfo() {
  const area = document.getElementById('info-area');
  area.style.opacity = '1';
}

// ==============================
// Run
// ==============================
async function run() {
  // Wait for images to load
  await Promise.all(
    [...document.querySelectorAll('.art-img')].map(img =>
      img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
    )
  );

  // Build info content upfront (hidden) so layout is stable
  await document.fonts.ready;
  buildInfoContent();

  await sleep(500);

  await revealBackground();
  await revealTitle();
  await revealLineup();
  await sleep(2000);
  await revealInfo();
}

run();
</script>
